<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ملعب جمعية الراكة</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="header">

<img src="images/logo.png" class="logo">

<h1>ملعب جمعية الراكة</h1>

<p>نظام إدارة الحجوزات والإحصائيات</p>

</div>

<div class="cards">

    <!-- حجز جديد -->
    <a href="booking.html" class="card">

        <div class="icon">
            <i class="fa-solid fa-calendar-plus"></i>
        </div>

        <h2>حجز جديد</h2>

        <p>إضافة حجز جديد للملعب بسهولة وسرعة.</p>

    </a>

    <!-- الحجوزات المعلقة -->
    <a href="pending.html" class="card">

        <div class="icon">
            🟡
        </div>

        <h2>الحجوزات المعلقة</h2>

        <p>الحجوزات التي تنتظر تأكيد الحضور.</p>

    </a>

    <!-- عرض الحجوزات -->
    <a href="bookings.html" class="card">

        <div class="icon">
            <i class="fa-solid fa-list-check"></i>
        </div>

        <h2>عرض الحجوزات</h2>

        <p>عرض جميع الحجوزات المؤكدة.</p>

    </a>

    <!-- التقويم -->
    <a href="calendar.html" class="card">

        <div class="icon">
            <i class="fa-solid fa-calendar-days"></i>
        </div>

        <h2>تقويم الحجوزات</h2>

        <p>عرض الأيام والأوقات المحجوزة.</p>

    </a>

    <!-- الإحصائيات -->
    <a href="stats.html" class="card">

        <div class="icon">
            <i class="fa-solid fa-chart-column"></i>
        </div>

        <h2>الإحصائيات</h2>

        <p>إحصائيات عدد الحجوزات والإيرادات.</p>

    </a>

</div>

</div>

</body>

</html>
