<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملعب جمعية الراكة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/v5.15.4/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="شعار جمعية الراكة" class="logo">
        </div>

        <h1>ملعب جمعية الراكة</h1>
        <p class="subtitle">نظام إدارة الحجوزات والإحصائيات</p>

        <div class="main-menu">
            <a href="add-booking.html" class="menu-card">
                <div class="icon-container">
                    <i class="fas fa-calendar-plus"></i>
                </div>
                <h3>حجز جديد</h3>
                <p>إضافة حجز جديد للملعب بسهولة وسرعة.</p>
            </a>

            <a href="view-bookings.html" class="menu-card">
                <div class="icon-container">
                    <i class="fas fa-list-ul"></i>
                </div>
                <h3>عرض الحجوزات</h3>
                <p>عرض جميع الحجوزات في بطاقات مرتبة.</p>
            </a>

            <a href="stats.html" class="menu-card">
                <div class="icon-container">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <h3>الإحصائيات</h3>
                <p>ملخص بياني وحسابي لأداء الملعب.</p>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
